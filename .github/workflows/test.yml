name: tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync the locked environment
        run: uv sync --locked --all-groups
      - name: Run behavior tests
        run: uv run pytest
      - name: Verify runtime export parity
        run: uv export --no-hashes --no-emit-project --no-dev --no-header | diff -u requirements.txt -
      - name: Verify development export parity
        run: uv export --no-hashes --no-emit-project --group dev --no-header | diff -u requirements-dev.txt -
